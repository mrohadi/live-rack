name: Deploy

# Build images for every service, push to GHCR, SSH to Lightsail, pull + restart.
# Triggers:
#   - push to main (auto)
#   - manual workflow_dispatch

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "services/**"
      - "pkg/**"
      - "migrations/**"
      - "deploy/docker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      ingest: ${{ steps.filter.outputs.ingest }}
      insight: ${{ steps.filter.outputs.insight }}
      rollup: ${{ steps.filter.outputs.rollup }}
      signals: ${{ steps.filter.outputs.signals }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # YAML anchors don't survive inside the `filters: |` literal-block
          # string — dorny/paths-filter sees the raw text. So duplicate
          # the "shared Go deps" patterns into every service filter inline.
          # Shared deps: pkg/**, go.work*, workflow file, deploy/docker/**.
          # workflow_dispatch bypasses the filter via matrix `changed` expr.
          filters: |
            web:
              - "apps/web/**"
              - ".github/workflows/deploy.yml"
              - "deploy/docker/**"
            api:
              - "services/api/**"
              - "pkg/**"
              - "go.work"
              - "go.work.sum"
              - ".github/workflows/deploy.yml"
              - "deploy/docker/**"
            ingest:
              - "services/ingest/**"
              - "pkg/**"
              - "go.work"
              - "go.work.sum"
              - ".github/workflows/deploy.yml"
              - "deploy/docker/**"
            insight:
              - "services/insight/**"
              - "pkg/**"
              - "go.work"
              - "go.work.sum"
              - ".github/workflows/deploy.yml"
              - "deploy/docker/**"
            rollup:
              - "services/rollup/**"
              - "pkg/**"
              - "go.work"
              - "go.work.sum"
              - ".github/workflows/deploy.yml"
              - "deploy/docker/**"
            signals:
              - "services/signals/**"
              - "pkg/**"
              - "go.work"
              - "go.work.sum"
              - ".github/workflows/deploy.yml"
              - "deploy/docker/**"

  build-push:
    name: Build + push ${{ matrix.image }}
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: liverack-web
            dockerfile: apps/web/Dockerfile
            context: .
            key: web
          - image: liverack-api
            dockerfile: services/api/Dockerfile
            context: .
            key: api
          - image: liverack-ingest
            dockerfile: services/ingest/Dockerfile
            context: .
            key: ingest
          - image: liverack-insight
            dockerfile: services/insight/Dockerfile
            context: .
            key: insight
          - image: liverack-rollup
            dockerfile: services/rollup/Dockerfile
            context: .
            key: rollup
          - image: liverack-signals
            dockerfile: services/signals/Dockerfile
            context: .
            key: signals
    steps:
      # Gate: evaluate `needs.changes.outputs.<key>` at STEP level. Putting
      # this expression in matrix.include silently yields empty string because
      # complex per-row expressions referencing `needs` aren't always resolved
      # at matrix-expansion time (observed on dorny/paths-filter v3 outputs).
      # Step-level `if` is the reliable contract.
      - name: Gate (compute changed flag)
        id: gate
        env:
          WEB: ${{ needs.changes.outputs.web }}
          API: ${{ needs.changes.outputs.api }}
          INGEST: ${{ needs.changes.outputs.ingest }}
          INSIGHT: ${{ needs.changes.outputs.insight }}
          ROLLUP: ${{ needs.changes.outputs.rollup }}
          SIGNALS: ${{ needs.changes.outputs.signals }}
          KEY: ${{ matrix.key }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$KEY" in
            web)     v="$WEB" ;;
            api)     v="$API" ;;
            ingest)  v="$INGEST" ;;
            insight) v="$INSIGHT" ;;
            rollup)  v="$ROLLUP" ;;
            signals) v="$SIGNALS" ;;
            *)       v="false" ;;
          esac
          echo "changed=${v:-false}" >> "$GITHUB_OUTPUT"

      - name: Skip when unchanged
        if: steps.gate.outputs.changed != 'true'
        run: |
          echo "::notice::No source changes for ${{ matrix.image }} — skipping build, will reuse :latest"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.changed == 'true'

      - name: Set up buildx
        if: steps.gate.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.15.2
            network=host
          buildkitd-flags: --debug

      - name: Login to GHCR
        if: steps.gate.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Owner lowercase
        if: steps.gate.outputs.changed == 'true'
        id: owner
        run: echo "lc=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        if: steps.gate.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Web build args
        if: steps.gate.outputs.changed == 'true' && matrix.image == 'liverack-web'
        id: web_args
        run: |
          {
            echo 'args<<EOF'
            echo "VITE_OIDC_ISSUER=${{ secrets.VITE_OIDC_ISSUER }}"
            echo "VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID }}"
            echo "VITE_OIDC_REDIRECT_URI=${{ secrets.VITE_OIDC_REDIRECT_URI }}"
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build + push
        if: steps.gate.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.web_args.outputs.args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }},ignore-error=true

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: production
      url: https://live-rack.mrohadi.com
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + caddy snippet to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/docker/docker-compose.prod.yml,deploy/docker/caddy-snippet.live-rack.conf,migrations/,scripts/seed/"
          target: "/home/${{ secrets.SSH_USER }}/live-rack/"
          strip_components: 0
          overwrite: true

      - name: Pull + restart on host
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER_VAR: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_OWNER_VAR
          script: |
            set -euo pipefail
            cd ~/live-rack
            # Use `latest` tag for every service. Path-filter skips rebuilds
            # for unchanged services, so their :latest still points to the
            # most-recent successful build. SHA tag stays on GHCR for forensics.
            grep -v -E '^(IMAGE_TAG|GHCR_OWNER)=' .env.prod > .env.prod.tmp || true
            echo "IMAGE_TAG=latest" >> .env.prod.tmp
            echo "GHCR_OWNER=$(echo ${GHCR_OWNER_VAR} | tr '[:upper:]' '[:lower:]')" >> .env.prod.tmp
            mv .env.prod.tmp .env.prod
            chmod 600 .env.prod

            # Images are PUBLIC on GHCR — no `docker login` needed.
            # Force a clean GHCR session: any stale auth (e.g., a token
            # scoped to mrohadi/* from a prior manual login) makes pulls
            # of foreign-namespace public images like zitadel/zitadel
            # return "denied: denied" because the token lacks scope.
            docker logout ghcr.io >/dev/null 2>&1 || true

            COMPOSE="docker compose -f deploy/docker/docker-compose.prod.yml --env-file .env.prod"

            $COMPOSE pull
            $COMPOSE up -d --remove-orphans

            # DB migrations — pressly/goose has no official Docker image,
            # so run via a transient golang container that go-installs the
            # binary then runs goose against the liverack network so it
            # can reach the `postgres` service by name.
            # Build DB_URL from POSTGRES_PASSWORD (single source of truth).
            POSTGRES_PW="$(grep ^POSTGRES_PASSWORD .env.prod | cut -d= -f2-)"
            DB_URL="postgres://postgres:${POSTGRES_PW}@postgres:5432/liverack?sslmode=disable"
            docker run --rm \
              --network liverack_liverack_internal \
              -v "$PWD/migrations:/m:ro" \
              -e GOOSE_DRIVER=postgres \
              -e GOOSE_DBSTRING="$DB_URL" \
              golang:1.26-alpine \
              sh -c "go install github.com/pressly/goose/v3/cmd/goose@v3.27.1 && /go/bin/goose -dir /m up"

            # Prune dangling images to free disk
            docker image prune -f
            $COMPOSE ps

      - name: Smoke check
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 https://live-rack.mrohadi.com/healthz > /dev/null; then
              echo "API healthy"; exit 0
            fi
            echo "Attempt $i — waiting 10s"
            sleep 10
          done
          echo "API health check failed after 60s"; exit 1
