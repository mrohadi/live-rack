name: Deploy

# Build images for every service, push to GHCR, SSH to Lightsail, pull + restart.
# Triggers:
#   - push to main (auto)
#   - manual workflow_dispatch

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "services/**"
      - "pkg/**"
      - "migrations/**"
      - "deploy/docker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-push:
    name: Build + push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: liverack-web
            dockerfile: apps/web/Dockerfile
            context: .
            build_args: |
              VITE_OIDC_ISSUER=${{ vars.VITE_OIDC_ISSUER }}
              VITE_OIDC_CLIENT_ID=${{ vars.VITE_OIDC_CLIENT_ID }}
              VITE_OIDC_REDIRECT_URI=${{ vars.VITE_OIDC_REDIRECT_URI }}
              VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          - image: liverack-api
            dockerfile: services/api/Dockerfile
            context: .
            build_args: ""
          - image: liverack-ingest
            dockerfile: services/ingest/Dockerfile
            context: .
            build_args: ""
          - image: liverack-insight
            dockerfile: services/insight/Dockerfile
            context: .
            build_args: ""
          - image: liverack-rollup
            dockerfile: services/rollup/Dockerfile
            context: .
            build_args: ""
          - image: liverack-signals
            dockerfile: services/signals/Dockerfile
            context: .
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Owner lowercase
        id: owner
        run: echo "lc=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: production
      url: https://live-rack.mrohadi.com
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + caddy snippet to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/docker/docker-compose.prod.yml,deploy/docker/caddy-snippet.live-rack.conf,migrations/"
          target: "/home/${{ secrets.SSH_USER }}/live-rack/"
          strip_components: 0
          overwrite: true

      - name: Pull + restart on host
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG_VAR: ${{ github.sha }}
          GHCR_OWNER_VAR: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG_VAR,GHCR_OWNER_VAR
          script: |
            set -euo pipefail
            cd ~/live-rack
            # Inject deploy-specific overrides without touching long-lived secrets
            grep -v -E '^(IMAGE_TAG|GHCR_OWNER)=' .env.prod > .env.prod.tmp || true
            echo "IMAGE_TAG=${IMAGE_TAG_VAR}" >> .env.prod.tmp
            echo "GHCR_OWNER=$(echo ${GHCR_OWNER_VAR} | tr '[:upper:]' '[:lower:]')" >> .env.prod.tmp
            mv .env.prod.tmp .env.prod
            chmod 600 .env.prod

            # Images are PUBLIC on GHCR — no `docker login` needed.
            # To switch back to private later:
            #   1. GitHub → Package settings → change visibility to private
            #   2. Re-add login step here using a PAT with read:packages.

            COMPOSE="docker compose -f deploy/docker/docker-compose.prod.yml --env-file .env.prod"

            $COMPOSE pull
            $COMPOSE up -d --remove-orphans

            # DB migrations
            docker run --rm --network liverack_liverack_internal \
              -e DATABASE_URL="$(grep ^DATABASE_URL .env.prod | cut -d= -f2-)" \
              -v "$PWD/migrations:/m" \
              ghcr.io/pressly/goose:latest \
              -dir /m postgres "$(grep ^DATABASE_URL .env.prod | cut -d= -f2-)" up

            # Prune dangling images to free disk
            docker image prune -f
            $COMPOSE ps

      - name: Smoke check
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 https://live-rack.mrohadi.com/api/health > /dev/null; then
              echo "API healthy"; exit 0
            fi
            echo "Attempt $i — waiting 10s"
            sleep 10
          done
          echo "API health check failed after 60s"; exit 1
