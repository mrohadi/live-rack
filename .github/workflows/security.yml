name: Security Scan

on:
  push:
    branches: ["main", "phase/**"]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: "0 3 * * 1" # Weekly Monday 3am UTC

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: gosec SAST
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - services/api
          - services/ingest
          - services/insight
          - services/rollup
          - services/signals
          - pkg/domain
          - pkg/auth
          - pkg/observability
          - pkg/store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run gosec (${{ matrix.module }})
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd ${{ matrix.module }}
          gosec -no-fail -fmt sarif -out gosec.sarif ./...
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.module }}/gosec.sarif
          category: gosec-${{ matrix.module }}

  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f services/api/Dockerfile -t live-rack-api:scan .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "live-rack-api:scan"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL,HIGH"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run semgrep
        run: semgrep scan --config=auto --sarif --output=semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
