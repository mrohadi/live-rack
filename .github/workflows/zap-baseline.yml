name: zap-baseline

# Passive DAST baseline scan against an ephemeral stack. Runs weekly and on
# demand; gates on the thresholds in .zap/rules.tsv.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose -f deploy/docker/docker-compose.yml up -d postgres nats clickhouse redis
          # API under test (built image or `go run`); wait for health.
          ./scripts/wait-for-health.sh http://localhost:8080/healthz 120

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          fail_action: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_md.md
