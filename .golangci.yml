linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - revive
    - gosec
    - bodyclose
    - contextcheck
    - exhaustive
    - noctx
    - sqlclosecheck
    - unparam
    - wastedassign

linters-settings:
  goimports:
    local-prefixes: github.com/live-rack
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-strings
      - name: var-naming
      - name: indent-error-flow
      - name: early-return
  gosec:
    excludes:
      - G115  # integer overflow (false positive on small ops)
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # test files: relax some rules
    - path: "_test\\.go"
      linters: [gosec, unparam]
    # generated sqlc files
    - path: "pkg/store/db/"
      linters: [revive, unused, exhaustive]
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  tests: true
