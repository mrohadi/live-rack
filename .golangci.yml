version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - contextcheck
    - exhaustive
    - noctx
    - sqlclosecheck
    - unparam
    - wastedassign

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/live-rack

linters-settings:
  gosec:
    excludes:
      - G115  # integer overflow (false positive on small ops)
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [gosec, unparam]
    - path: "pkg/store/db/"
      linters: [revive, unused, exhaustive]
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  tests: true
