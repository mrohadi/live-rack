# Append this block to the host Caddyfile (~/caddy/Caddyfile on Lightsail)
# then: docker compose -f ~/caddy/docker-compose.yml restart caddy
#
# Prereqs on host:
#   Network `caddy` already exists (from existing ~/caddy/docker-compose.yml)
#   web + api + zitadel containers join `caddy` (set in our prod compose)
#   Cloudflare DNS A record: live-rack -> 18.140.191.209 (proxy OFF)

live-rack.mrohadi.com {
	tls /etc/caddy/certs/mrohadi.com.pem /etc/caddy/certs/mrohadi.com.key

	encode gzip zstd

	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
		X-Content-Type-Options    "nosniff"
		X-Frame-Options           "SAMEORIGIN"
		Referrer-Policy           "strict-origin-when-cross-origin"
		Permissions-Policy        "camera=(self), microphone=()"
		-Server
	}

	# Zitadel routes first (specific paths win over fallback).
	# /zitadel.* covers the gRPC-Web service POSTs the console issues
	# (e.g. /zitadel.user.v2beta.UserService/GetMyUser). Missing them
	# previously fell through to the SPA, which returned 405 on POST.
	# Zitadel login UI fetches its own /assets/* with Referer set to /ui/*.
	# Without the Referer check, Vite's /assets/index-*.{js,css} get routed
	# to Zitadel and 404 (response: {"code":5,"message":"Not Found"}),
	# producing a blank SPA. Browser requests for SPA bundles have either no
	# Referer or referer https://live-rack.mrohadi.com/.
	@zitadel_assets {
		path /assets/*
		header Referer *://*/ui/*
	}
	reverse_proxy @zitadel_assets h2c://zitadel:8080 {
		header_up Host {host}
		header_up X-Forwarded-Proto https
		header_up -X-Forwarded-Host
	}

	@zitadel path /ui/* \
	             /oauth/* /oidc/* /openid/* \
	             /admin/* /system/* /management/* /auth/* \
	             /.well-known/* \
	             /device/* /idps/* \
	             /zitadel.* \
	             /grpc/* /debug/*
	reverse_proxy @zitadel h2c://zitadel:8080 {
		header_up Host {host}
		header_up X-Forwarded-Proto https
		# Preserve gRPC content-type so the console's RPCs aren't mangled
		header_up -X-Forwarded-Host
	}

	# API + WebSocket. /healthz is the api's unauthenticated liveness probe
	# (CI smoke check + uptime monitoring). All app routes live under /api/v1.
	@api path /api/* /ws /ws/* /healthz
	reverse_proxy @api api:8080 {
		header_up Host {host}
		header_up X-Forwarded-Proto https
		header_up X-Real-IP {remote}
	}

	# SPA fallback
	reverse_proxy web:80
}
