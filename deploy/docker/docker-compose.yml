services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: liverack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10

  nats:
    image: nats:latest
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: liverack
      CLICKHOUSE_USER: liverack
      CLICKHOUSE_PASSWORD: liverack
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── Observability stack (ELK + Elastic APM + OTel) ───────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: "changeme"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u elastic:changeme http://localhost:9200/_cluster/health | grep -E 'yellow|green'",
        ]
      interval: 10s
      retries: 15

  # One-shot: set kibana_system password so Kibana can connect.
  es-setup:
    image: curlimages/curl:8.8.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        curl -fsS -u elastic:changeme -X POST \
          'http://elasticsearch:9200/_security/user/kibana_system/_password' \
          -H 'Content-Type: application/json' \
          -d '{"password":"changeme"}'
        echo " kibana_system password set"
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: changeme
      # Dev-only static keys — DO NOT reuse in any other environment.
      XPACK_SECURITY_ENCRYPTIONKEY: "live_rack_dev_security_key_32chr!"
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "live_rack_dev_saved_obj_key_32chr"
      XPACK_REPORTING_ENCRYPTIONKEY: "live_rack_dev_reporting_key_32chr"
      # Pre-set Fleet server URL so APM integration installs cleanly.
      XPACK_FLEET_AGENTS_ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"
    depends_on:
      es-setup:
        condition: service_completed_successfully

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    command: ["-f", "/usr/share/logstash/pipeline/logstash.conf"]
    environment:
      ELASTIC_USERNAME: elastic
      ELASTIC_PASSWORD: changeme
    volumes:
      - ../elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044" # beats input
      - "5001:5001" # tcp/json input
    depends_on:
      elasticsearch:
        condition: service_healthy

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    command: ["--strict.perms=false", "-e"]
    user: apm-server
    volumes:
      - ../elk/apm-server.yml:/usr/share/apm-server/apm-server.yml:ro
    ports:
      - "8200:8200" # OTLP / APM ingest
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    user: root
    command: ["-strict.perms=false", "-e"]
    volumes:
      - ../elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ../elk/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC (services → collector)
      - "4318:4318" # OTLP HTTP
    depends_on:
      - apm-server

  # ─── Zitadel (self-hosted OIDC IdP, replaces Clerk) ──────────────────────────
  zitadel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel
      POSTGRES_DB: zitadel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - zitadel_db_data:/var/lib/postgresql/data

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.71.9
    command: 'start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled'
    environment:
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8081
      # Force legacy hosted login (v1) — v2.71 defaults the console to Login UI v2 (/login), unbundled here.
      ZITADEL_OIDC_DEFAULTLOGINURLV2: ""
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: ""
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin123!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
    ports:
      - "8081:8080"
    depends_on:
      zitadel-db:
        condition: service_healthy

volumes:
  postgres_data:
  nats_data:
  clickhouse_data:
  redis_data:
  minio_data:
  elasticsearch_data:
  zitadel_db_data:
