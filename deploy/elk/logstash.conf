# Optional Logstash pipeline — currently a pass-through for beats / TCP JSON.
# Add filter blocks here as parsing needs grow.

input {
  beats {
    port => 5044
  }
  tcp {
    port => 5001
    codec => json_lines
  }
}

filter {
  # Example: parse Go slog JSON logs and promote common fields.
  if [message] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "${ELASTIC_USERNAME}"
    password => "${ELASTIC_PASSWORD}"
    index => "logstash-%{+YYYY.MM.dd}"
  }
}
