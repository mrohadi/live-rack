receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Elastic APM Server accepts OTLP natively over gRPC.
  otlp/elastic:
    endpoint: apm-server:8200
    tls:
      insecure: true
  # Ship logs straight to Elasticsearch via the elasticsearch exporter.
  elasticsearch/logs:
    endpoints: ["http://elasticsearch:9200"]
    user: "elastic"
    password: "changeme"
    logs_index: "logs-otel-default"
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/elastic]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/elastic]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch/logs]
