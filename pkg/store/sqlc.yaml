version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "../../migrations/"
    gen:
      go:
        package: "store"
        out: "."
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
